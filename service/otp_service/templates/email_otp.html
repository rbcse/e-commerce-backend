<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      font-family: Arial;
      padding: 20px;
    }
    .otp {
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your OTP Code</h2>
    <p>Hello,</p>
    <p>Your OTP is:</p>
    <p class="otp">{{.OTP}}</p>
    <p>This OTP is valid for 5 minutes.</p>
  </div>
</body>
</html>
